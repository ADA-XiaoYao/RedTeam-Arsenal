<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedTeam-Arsenal GUI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #e0e0e0; }
        .card { background-color: #1e1e1e; border-color: #333; color: #e0e0e0; margin-bottom: 15px; }
        .btn-primary { background-color: #007bff; border: none; }
        .btn-primary:hover { background-color: #0056b3; }
        .badge { font-size: 0.9em; }
        .sidebar { background-color: #181818; min-height: 100vh; padding-top: 20px; border-right: 1px solid #333; }
        .nav-link { color: #aaa; }
        .nav-link:hover { color: #fff; background-color: #252525; }
        .nav-link.active { color: #fff; background-color: #333; font-weight: bold; }
        .header { padding: 20px; border-bottom: 1px solid #333; margin-bottom: 20px; }
        .tool-category { margin-top: 30px; border-left: 4px solid #007bff; padding-left: 15px; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-2 d-none d-md-block sidebar">
                <div class="position-sticky">
                    <h4 class="px-3 mb-4 text-primary">⚔️ Arsenal</h4>
                    <ul class="nav flex-column">
                        <li class="nav-item"><a class="nav-link active" href="#">Dashboard</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Tools</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Settings</a></li>
                    </ul>
                </div>
            </nav>

            <!-- Main Content -->
            <main class="col-md-10 ms-sm-auto px-md-4">
                <div class="header d-flex justify-content-between align-items-center">
                    <h1 class="h2">RedTeam-Arsenal: Single Combat Toolkit</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <button type="button" class="btn btn-sm btn-outline-secondary">Update Arsenal</button>
                    </div>
                </div>

                <div class="row mt-4">
                    {% for category, tool_list in tools.items() %}
                    <div class="col-12">
                        <h3 class="tool-category">{{ category }}</h3>
                        <div class="row">
                            {% for tool in tool_list %}
                            <div class="col-md-4">
                                <div class="card shadow-sm">
                                    <div class="card-body">
                                        <h5 class="card-title">{{ tool.name }} <span class="badge bg-secondary float-end">{{ tool.version }}</span></h5>
                                        <p class="card-text small text-muted">{{ tool.description }}</p>
                                        <div class="d-flex justify-content-between align-items-center">
                                            <button class="btn btn-sm btn-primary">Install</button>
                                            <a href="{{ tool.url }}" target="_blank" class="btn btn-sm btn-outline-info">Source</a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            {% endfor %}
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
